apiVersion: apps/v1
kind: Deployment
metadata:
  name: beleganski-jaas
  labels:
    app: beleganski-jaas
    version: jacuzzi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beleganski-jaas
  template:
    metadata:
      labels:
        app: beleganski-jaas
        version: jacuzzi
    spec:
      containers:
        - name: beleganski-jaas
          image: dporkov/beleganski-jaas:5df3d5d9b0db5203b4a4a3ac2169f4f6254afa47
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
