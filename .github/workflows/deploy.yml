name: Build & Push to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            dporkov/beleganski-jaas:latest
            dporkov/beleganski-jaas:${{ github.sha }}

      - name: Update image tag in deployment
        run: |
          sed -i "s|dporkov/beleganski-jaas:.*|dporkov/beleganski-jaas:${{ github.sha }}|" k8s/deployment.yaml

      - name: Commit and push updated deployment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "ci: update image to ${{ github.sha }}" || echo "No changes to commit"
          git push
